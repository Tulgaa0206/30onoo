<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR HTML Demo</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .info {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.65);
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="info">
    Камераа Hiro marker руу чиглүүлээрэй
  </div>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    arjs="sourceType: webcam; debugUIEnabled: false;"
  >
    <!-- 3D model asset -->
    <a-assets>
      <!-- Өөрийн татсан .glb model-оо index.html-тэй нэг folder дотор model.glb нэрээр байрлуул -->
      <a-asset-item id="myModel" src="model.glb.glb"></a-asset-item>
    </a-assets>

    <!-- Hiro marker -->
    <a-marker preset="hiro">
      <!-- Your 3D Model -->
      <a-entity
        gltf-model="#myModel"
        position="0 0 0"
        rotation="0 0 0"
        scale="0.5 0.5 0.5"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 6000"
      ></a-entity>

      <!-- Optional text -->
      <a-text
        value="My AR Model"
        position="0 1.2 0"
        rotation="-90 0 0"
        align="center"
        color="#ffffff"
        width="4"
      ></a-text>
    </a-marker>

    <!-- Camera -->
    <a-entity camera></a-entity>
  </a-scene
</body>
</html>
